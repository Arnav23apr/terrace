app = "terrace-ws"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  MIN_PER_SEC = "2"
  REPLAY_GAP_SEC = "15"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "15s"
  timeout = "3s"
  grace_period = "10s"
  method = "get"
  path = "/health"
