<!doctype html>
<html>
<head><meta charset="utf-8" />
<style>
  body { width: 260px; margin: 0; padding: 16px; font-family: -apple-system, system-ui, sans-serif;
    background: #0f1116; color: #eef0f3; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .logo { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 8px; background: #5ce1a6; color: #0a0b0e; }
  p { margin: 0 0 14px; font-size: 12.5px; line-height: 1.5; color: rgba(255,255,255,.55); }
  a.cta { display: block; text-align: center; text-decoration: none; background: #fff; color: #0a0b0e;
    font-weight: 600; font-size: 13px; padding: 10px; border-radius: 999px; margin-bottom: 8px; }
  .hint { font: 500 10.5px ui-monospace, monospace; color: rgba(255,255,255,.35); text-align: center; }
</style></head>
<body>
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16M6 20V9l6-4 6 4v11M9 20v-6h6v6"/></svg></span>
    Terrace
  </div>
  <p>The widget rides along on every page. Drag it anywhere, react with the room, and it flashes when a goal drops.</p>
  <a class="cta" href="http://localhost:3000" target="_blank">Open the full terrace</a>
  <div class="hint">watching the live match automatically</div>
</body>
</html>
